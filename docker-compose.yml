version: '3.8'

services:
  resource-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linux-resource-monitor
    ports:
      - "9002:9002"
    environment:
      RESOURCE_MONITOR_PORT: "9002"
      RESOURCE_MONITOR_UPDATE_INTERVAL_MS: "1000"
      RESOURCE_MONITOR_TOP_PROCESSES_COUNT: "25"
      RESOURCE_MONITOR_LOG_LEVEL: "INFO"
      RESOURCE_MONITOR_LOG_FILE: "/app/logs/resource-monitor.log"
      RESOURCE_MONITOR_LOG_TO_CONSOLE: "true"
      RESOURCE_MONITOR_LOG_TO_FILE: "true"
    volumes:
      - ./logs:/app/logs
      - /proc:/proc:ro  # Mount read-only /proc for metrics collection
      - /sys:/sys:ro    # Mount read-only /sys for additional metrics
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9002/ws"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Limit resource usage
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M

  # Optional: Nginx reverse proxy for serving frontend
  nginx:
    image: nginx:alpine
    container_name: resource-monitor-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - resource-monitor
    restart: unless-stopped
